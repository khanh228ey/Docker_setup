## Nginx config generated from env at container start.
## Provide multiple domains as a space-separated string, e.g.
## LARAVEL_SERVER_NAMES="laravel.local.com laravel.test"

# =============================================
# Laravel
# =============================================
server {
    listen 80;
    server_name ${LARAVEL_SERVER_NAMES};

    root /var/www/laravel/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}

# =============================================
# NestJS
# =============================================
server {
    listen 80;
    server_name ${NEST_SERVER_NAMES};

    location / {
        proxy_pass http://nestjs:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# =============================================
# ReactJS
# =============================================
server {
    listen 80;
    server_name ${REACT_SERVER_NAMES};

    location / {
        proxy_pass http://reactjs:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}