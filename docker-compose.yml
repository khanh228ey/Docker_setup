version: "3.8"

services:

  # ==========================================
  # NGINX - reverse proxy
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./default.conf:/etc/nginx/templates/default.conf.template:ro
      - ../laravel_service/public:/var/www/laravel/public:ro
    env_file:
      - ./.env
    depends_on:
      - laravel
      - nestjs
      - reactjs
    networks:
      - app_network
    mem_limit: 128m
    cpus: 0.5

  # ==========================================
  # LARAVEL - PHP-FPM
  # ==========================================
  laravel:
    build:
      context: ..
      dockerfile: docker/Dockerfile.laravel
    container_name: laravel
    working_dir: /var/www/laravel
    volumes:
      - ../laravel_service:/var/www/laravel:delegated
      - laravel_vendor:/var/www/laravel/vendor
    ports:
      - "9000:9000"
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    networks:
      - app_network
    mem_limit: 512m
    cpus: 1.0

  # ==========================================
  # NESTJS
  # ==========================================
  nestjs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nestjs
    container_name: nestjs
    working_dir: /app
    volumes:
      - ../nest_service:/app:cached
      - nest_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    networks:
      - app_network
    mem_limit: 1g
    cpus: 1.5

  # ==========================================
  # REACTJS
  # ==========================================
  reactjs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.react
    container_name: reactjs
    working_dir: /app
    volumes:
      - ../react_service:/app:cached
      - react_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    networks:
      - app_network
    mem_limit: 1g
    cpus: 1.5

  # ==========================================
  # CLICKHOUSE
  # ==========================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=codechill
    ports:
      - "8123:8123" # HTTP interface
      - "9001:9000" # Native TCP protocol (host 9001 -> laravel already uses host 9000)
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    mem_limit: 1g
    cpus: 1.5

networks:
  app_network:
    driver: bridge

volumes:
  nest_node_modules:
  react_node_modules:
  laravel_vendor:
  clickhouse_data:
